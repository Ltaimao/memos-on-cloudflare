name = "cfmemos"
main = "worker/src/index.ts"
compatibility_date = "2025-05-01"

[assets]
directory = "./web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/file/*", "/u/*", "/explore/rss.xml"]

[vars]
INSTANCE_NAME = "cfmemos"
APP_VERSION = "1.0.0"

[[d1_databases]]
binding = "DB"
database_name = "cfmemos-db"
database_id = "e431b879-e6f9-4f3b-8741-15b586f36766"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "cfmemos"

[[kv_namespaces]]
binding = "CACHE"
id = "59689c7599994e2ca39cf750880fc9fa"

[ai]
binding = "AI"
